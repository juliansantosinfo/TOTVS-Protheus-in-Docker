name: Test Docker Compose Files

on:
  push:
    branches: ["master", "main", "12.1.*"]
    paths-ignore:
      - "**/.vscode/**"
      - "**/docs/**"
      - "**/scripts/hooks/**"
      - "**/.env.example"
      - "**/.gitignore"
      - "**/.antigravityignore"
      - "**/CHANGELOG"
      - "**/LICENSE*"
      - "**/README.md"
      - "**/GEMINI.md"
      - "**/run.sh"
      - "**/clean.sh"

  pull_request:
    branches: ["master", "main", "12.1.*"]
    paths-ignore:
      - "**/.vscode/**"
      - "**/docs/**"
      - "**/scripts/hooks/**"
      - "**/.env.example"
      - "**/.gitignore"
      - "**/.antigravityignore"
      - "**/CHANGELOG"
      - "**/LICENSE*"
      - "**/README.md"
      - "**/GEMINI.md"
      - "**/run.sh"
      - "**/clean.sh"

  workflow_dispatch:
    inputs:
      service:
        description: 'Selecione o docker-compose file para smoke test (ou "all" para todos)'
        required: true
        default: "all"
        type: choice
        options:
          - all
          - docker-compose-postgresql.yaml
          - docker-compose-mssql.yaml
          - docker-compose-oracle.yaml

jobs:
  setup-runner:
    runs-on: ubuntu-latest
    outputs:
      runner: ${{ steps.check.outputs.runner }}
    steps:
      - name: Check self-hosted runner availability
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Verificando se há runners self-hosted ativos..."
          # Consulta a API do GitHub para listar runners 'online' com a label 'self-hosted'
          RUNNERS=$(gh api /repos/${{ github.repository }}/actions/runners --jq '.runners[] | select(.status=="online" and (.labels[].name=="self-hosted")) | .name' || echo "")
          
          if [ -n "$RUNNERS" ]; then
            echo "Runner self-hosted ONLINE. Utilizando-o para a esteira."
            echo "runner=self-hosted" >> "$GITHUB_OUTPUT"
          else
            echo "Runner self-hosted OFFLINE ou não configurado. Fallback ativado: ubuntu-latest."
            echo "runner=ubuntu-latest" >> "$GITHUB_OUTPUT"
          fi

  lint-and-validation:
    needs: setup-runner
    runs-on: ${{ needs.setup-runner.outputs.runner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install ShellCheck and Hadolint
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          sudo curl -L https://github.com/hadolint/hadolint/releases/latest/download/hadolint-linux-x86_64 -o /usr/local/bin/hadolint
          sudo chmod +x /usr/local/bin/hadolint

      - name: Make scripts executable
        run: |
          find scripts/ -name "*.sh" -exec chmod +x {} +
          find services/ -name "*.sh" -exec chmod +x {} +

      - name: Validate .env
        run: ./scripts/validation/env.sh

      - name: Run Docker Compose Config Check
        run: ./scripts/validation/lint-compose.sh

      - name: Run Hadolint (Dockerfile)
        run: ./scripts/validation/lint-dockerfile.sh

      - name: Run ShellCheck
        run: ./scripts/validation/lint-shell.sh

      - name: Validate Versions
        run: ./scripts/validation/versions.sh

  smoke_test:
    needs: [setup-runner, lint-and-validation]
    runs-on: ${{ needs.setup-runner.outputs.runner }}
    strategy:
      fail-fast: false
      matrix:
        service: ${{ (github.event.inputs.service == 'all' || github.event.inputs.service == '') && fromJSON('["docker-compose-postgresql.yaml", "docker-compose-mssql.yaml", "docker-compose-oracle.yaml"]') || fromJSON(format('["{0}"]', github.event.inputs.service)) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Make scripts executable
        run: |
          find scripts/ -name "*.sh" -exec chmod +x {} +
          find services/ -name "*.sh" -exec chmod +x {} +

      - name: Run Smoke Test
        run: ./scripts/test/test-compose.sh -f ${{ matrix.service }}
