name: Build and Push Docker Images

on:
  push:
    branches: [ "master", "main", "12.1.*" ]
    paths-ignore:
      - '**/.vscode/**'
      - '**/docs/**'
      - '**/scripts/hooks/**'
      - '**/.env.example'
      - '**/.gitignore'
      - '**/.antigravityignore'
      - '**/CHANGELOG'
      - '**/LICENSE*'
      - '**/README.md'
      - '**/GEMINI.md'
      - '**/docker-compose*'
      - '**/run.sh'
      - '**/clean.sh'

  pull_request:
    branches: [ "master", "main", "12.1.*" ]
    paths-ignore:
      - '**/.vscode/**'
      - '**/docs/**'
      - '**/scripts/hooks/**'
      - '**/.env.example'
      - '**/.gitignore'
      - '**/.antigravityignore'
      - '**/CHANGELOG'
      - '**/LICENSE*'
      - '**/README.md'
      - '**/GEMINI.md'
      - '**/docker-compose*'
      - '**/run.sh'
      - '**/clean.sh'
      
  workflow_dispatch:
    inputs:
      service:
        description: 'Selecione o serviço para build/push (ou "all" para todos)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - appserver
          - dbaccess
          - licenseserver
          - mssql
          - oracle
          - postgres
          - smartview

jobs:
  lint-and-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install ShellCheck and Hadolint
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          sudo curl -L https://github.com/hadolint/hadolint/releases/latest/download/hadolint-linux-x86_64 -o /usr/local/bin/hadolint
          sudo chmod +x /usr/local/bin/hadolint

      - name: Make scripts executable
        run: find scripts/ -name "*.sh" -exec chmod +x {} +

      - name: Validate .env
        run: ./scripts/validation/env.sh

      - name: Run Docker Compose Config Check
        run: ./scripts/validation/lint-compose.sh

      - name: Run Hadolint (Dockerfile)
        run: ./scripts/validation/lint-dockerfile.sh

      - name: Run ShellCheck
        run: ./scripts/validation/lint-shell.sh

      - name: Validate Versions
        run: ./scripts/validation/versions.sh

  smoke_test:
    needs: lint-and-validation
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [docker-compose.yaml, docker-compose-postgresql.yaml, docker-compose-mssql.yaml, docker-compose-oracle.yaml]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Make scripts executable
        run: find scripts/ -name "*.sh" -exec chmod +x {} +
      
      - name: Build images
        run: ./scripts/build/build.sh

      - name: Run Smoke Test
        run: ./scripts/test/test-compose.sh -f ${{ matrix.service }}

  build-and-push:
    needs: 
      - lint-and-validation
      - smoke_test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ (github.event.inputs.service == 'all' || github.event.inputs.service == '') && fromJSON('["appserver", "dbaccess", "licenseserver", "mssql", "oracle", "postgres", "smartview"]') || fromJSON(format('["{0}"]', github.event.inputs.service)) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Make scripts executable
        run: find scripts/ -name "*.sh" -exec chmod +x {} +

      - name: Build Docker image
        run: ./scripts/build/build.sh ${{ matrix.service }}

      - name: Push Docker image
        run: ./scripts/build/push.sh ${{ matrix.service }}
